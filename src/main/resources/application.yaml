spring:
  application:
    name: declutter-ai
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/declutter_ai}
    username: ${DB_USERNAME:declutter}
    password: ${DB_PASSWORD:declutter}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:replace-me}
            client-secret: ${GOOGLE_CLIENT_SECRET:replace-me}
            scope:
              - openid
              - profile
              - email
              - https://www.googleapis.com/auth/gmail.metadata

gmail:
  api-base-url: https://gmail.googleapis.com
