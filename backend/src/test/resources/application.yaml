spring:
  datasource:
    url: jdbc:h2:mem:declutter_ai;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-client
            client-secret: test-secret
            scope:
              - openid
              - profile
              - email

gmail:
  api-base-url: https://gmail.googleapis.com

app:
  frontend-url: http://localhost:5173
